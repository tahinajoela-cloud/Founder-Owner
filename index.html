<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Halashon Ivryt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div id="login-section">
        <h2>Fidiran'ny Mpiandraikitra</h2>
        <input type="email" id="email" placeholder="Mailaka">
        <input type="password" id="password" placeholder="Tenimiafina">
        <button id="login-btn">Hiditra</button>
    </div>

    <div id="admin-dashboard" style="display: none;">
        <h2>FANARAHA-MASON'NY MPIANDRAIKITRA</h2>
        <button id="sync-btn">🔄 Sync Google Sheets</button>
        <div id="logs">Miandry ny baiko...</div>
        
        <hr>
        <h3>MAMPIDITRA MPIANATRA VAOVAO</h3>
        <input type="text" id="new-student-name" placeholder="Anarana">
        <input type="email" id="new-student-email" placeholder="Mailaka">
        <input type="text" id="new-student-levels" placeholder="Levels (ohatra: A1,A2)">
        <button id="add-student-btn">Ampidirina</button>

        <h3>LISITRY NY MPIANATRA</h3>
        <input type="text" id="search-input" placeholder="Mikaroka mpianatra (anarana/email)..." onkeyup="filterTable()">
        <table id="student-table">
            <thead><tr><th>Anarana</th><th>Mailaka</th><th>Device ID</th><th>Levels</th><th>Hetsika</th></tr></thead>
            <tbody id="student-list"></tbody>
        </table>
        <button id="logout-btn" style="background: #ff4500; color:white; margin-top: 20px;">Hivoaka</button>
    </div>
</div>
<script type="module" src="admin.js"></script>
</body>
</html>
