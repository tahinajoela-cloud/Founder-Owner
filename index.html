<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mba halady amin'ny finday -->
    <title>Admin Panel - Halashon Ivryt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- FIZARANA FIDIRANA -->
    <div id="login-section">
        <h2>Fidiran'ny Mpiandraikitra</h2>
        <input type="email" id="email" placeholder="Mailaka" required>
        <input type="password" id="password" placeholder="Tenimiafina" required>
        <button id="login-btn">Hiditra</button>
    </div>

    <!-- FIZARANA DASHBOARD -->
    <div id="admin-dashboard" style="display: none;">
        <h2>FANARAHA-MASON'NY MPIANDRAIKITRA</h2>
        <div class="sync-box">
            <button id="sync-btn">🔄 Sync Google Sheets</button>
            <div id="logs">Miandry ny baiko...</div>
        </div>
        
        <hr>
        
        <!-- FORM MAMPIDITRA -->
        <h3>MAMPIDITRA MPIANATRA VAOVAO</h3>
        <div class="add-student-form">
            <input type="text" id="new-student-name" placeholder="Anarana" required>
            <input type="email" id="new-student-email" placeholder="Mailaka" required>
            <input type="text" id="new-student-levels" placeholder="Dingana / Levels (ohatra: A1,A2)">
            <button id="add-student-btn">Ampidirina</button>
        </div>

        <hr>

        <!-- LISITRA -->
        <h3>LISITRY NY MPIANATRA</h3>
        <input type="text" id="search-input" placeholder="Mikaroka mpianatra (anarana/email)...">
        
        <div class="table-responsive"> <!-- Mba tsy hihoatra ny sisiny raha tery ny ecran -->
            <table id="student-table">
                <thead>
                    <tr>
                        <th>Anarana</th>
                        <th>Mailaka</th>
                        <th>Device ID</th>
                        <th>Levels</th>
                        <th>Hetsika</th>
                    </tr>
                </thead>
                <tbody id="student-list"></tbody>
            </table>
        </div>
        
        <button id="logout-btn" style="background: #ff4500; color:white; margin-top: 20px;">Hivoaka</button>
    </div>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
